<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before Becoming Heartless</title>
    
    <!-- Importazione dei font dal web (Eater per il caos/spinoso, Cinzel per il resto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Eater&display=swap" rel="stylesheet">

    <style>
        /* 
        =========================================================
        SE HAI IL FILE DEL FONT ESATTO DELLA COVER SUL TUO PC:
        1. Mettilo nella stessa cartella di questo file (es. font-ragnatela.ttf).
        2. Togli i commenti (/* e */) qui sotto.
        3. Scrivi il nome esatto del tuo file al posto di 'nome-del-font.ttf'.
        4. Nel blocco "h1" più in basso, cambia 'Eater' in 'CustomSigil'.
        =========================================================
        */
        
        /*
        @font-face {
            font-family: 'CustomSigil';
            src: url('nome-del-font.ttf') format('truetype');
        }
        */

        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Sfondo scuro */
            color: #ffffff;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }

        h1 {
            /* Font spinoso e caotico per simulare lo stile della cover */
            font-family: 'Eater', cursive; 
            font-size: 4.5rem; 
            font-weight: normal;
            margin-bottom: 25px;
            margin-top: 20px;
            color: #f2e6ff; /* Bianco con una leggerissima sfumatura viola */
            text-shadow: 0px 0px 20px rgba(153, 51, 255, 0.7); /* Bagliore viola acceso stile cover */
            letter-spacing: 5px;
            line-height: 1.2;
            max-width: 1000px;
        }

        .image-container {
            margin-bottom: 35px;
        }

        img {
            max-width: 90%;
            height: auto;
            width: 450px;
            border-radius: 5px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.9);
            border: 1px solid #332244; /* Bordo leggermente violaceo scuro */
        }

        #countdown {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 700;
            color: #b366ff; /* Viola per abbinarsi all'estetica di Heartless */
            letter-spacing: 3px;
        }

        .btn {
            text-decoration: none;
            background-color: #ffffff;
            color: #000000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 2px;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn:hover {
            background-color: #9933ff; /* Viola acceso al passaggio del mouse */
            color: #ffffff;
            box-shadow: 0 0 20px rgba(153, 51, 255, 0.8);
        }

        /* Adattamento per i telefoni */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            #countdown { font-size: 1.5rem; }
            img { width: 300px; }
        }
    </style>
</head>
<body>

    <!-- Testo principale -->
    <h1>BEFORE BECOMING HEARTLESS</h1>

    <div class="image-container">
        <!-- L'immagine della cover (deve chiamarsi heartless.jpeg) -->
        <img src="beforebecomingheartlesscover.jpeg" alt="Cover Image">
    </div>

    <div id="countdown">Calcolo del tempo...</div>

    <!-- Pulsante con il tuo link Instagram -->
    <a href="https://www.instagram.com/heartlessthealbum" class="btn" target="_blank">Entra</a>

    <script>
        // Data finale: 24 Luglio 2026 all'01:00:00 di notte.
        const countDownDate = new Date("July 24, 2026 01:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                days + "G : " + formatTime(hours) + "H : " + formatTime(minutes) + "M : " + formatTime(seconds) + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "QUALCHE TEMPO PRIMA DAL DIVENTARE SENZA CUORE.";
            }
        }, 1000);
    </script>

</body>
</html>
