<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before Becoming Heartless</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Eater&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }

        h1 {
            font-family: 'Eater', cursive; 
            font-size: 4.5rem; 
            font-weight: normal;
            margin-bottom: 25px;
            margin-top: 20px;
            color: #f2e6ff;
            text-shadow: 0px 0px 20px rgba(153, 51, 255, 0.7);
            letter-spacing: 5px;
            line-height: 1.2;
            max-width: 1000px;
        }

        .image-container {
            margin-bottom: 35px;
        }

        img {
            max-width: 90%;
            height: auto;
            width: 450px;
            border-radius: 5px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.9);
            border: 1px solid #332244;
        }

        #countdown {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 700;
            color: #b366ff;
            letter-spacing: 3px;
        }

        .btn {
            text-decoration: none;
            background-color: #ffffff;
            color: #000000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 2px;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn:hover {
            background-color: #9933ff;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(153, 51, 255, 0.8);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            #countdown { font-size: 1.5rem; }
            img { width: 300px; }
        }
    </style>
</head>
<body>

    <h1>BEFORE BECOMING HEARTLESS</h1>

    <div class="image-container">
        <img src="beforebecomingheartlesscover.jpeg" alt="Cover Image">
    </div>

    <div id="countdown">Calcolo del tempo...</div>

    <a href="https://www.instagram.com/heartlessthealbum" class="btn" target="_blank">Entra</a>

    <script>
        const countDownDate = new Date("July 24, 2026 01:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                days + "G : " + formatTime(hours) + "H : " + formatTime(minutes) + "M : " + formatTime(seconds) + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "HEARTLESS IS HERE.";
            }
        }, 1000);
    </script>

</body>
</html>
